name: 🚀 Build & Release Gestion Financière Little

permissions:
  contents: write
  actions: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build et Release multi-plateforme
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: 🧰 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📥 Installer Tesseract OCR pour Windows uniquement
        if: runner.os == 'Windows'
        run: |
          # Télécharger et installer Tesseract pour Windows
          choco install tesseract -y
          # Créer le dossier tesseract local
          mkdir -p tesseract
          # Copier Tesseract depuis l'installation système
          cp -r "C:/Program Files/Tesseract-OCR/"* tesseract/ || true
          echo "✅ Tesseract installé et copié pour Windows"
        shell: bash
      
      - name: 📝 Créer le dossier dist
        run: |
          mkdir -p dist
          echo "✅ Dossier dist créé"
        shell: bash

      - name: 📝 Créer script de lancement pour Linux/macOS
        if: runner.os != 'Windows'
        run: |
          cat > dist/run.sh << 'RUNSCRIPT'
          #!/bin/bash
          # Script de lancement Gestion Financière Little
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚀 Gestion Financière Little"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          # Détection spécifique de MX Linux et dérivés Debian
          detect_linux_distro() {
              if [ -f /etc/os-release ]; then
                  . /etc/os-release
                  # Détection spécifique pour MX Linux
                  if [ -f /etc/mx-version ]; then
                      echo "MX Linux"
                  else
                      echo "$NAME"
                  fi
              elif command -v lsb_release &> /dev/null; then
                  lsb_release -d | cut -f2
              else
                  echo "Unknown"
              fi
          }
          
          DISTRO=$(detect_linux_distro)
          echo "🐧 Distribution détectée: $DISTRO"
          echo ""
          
          # Fonction pour installer Tesseract OCR
          install_tesseract() {
              echo "📦 Installation de Tesseract OCR..."
              case "$DISTRO" in
                  *"Debian"*|*"Ubuntu"*|*"MX"*|*"Linux Mint"*)
                      sudo apt-get update
                      sudo apt-get install -y tesseract-ocr tesseract-ocr-fra || {
                          echo "❌ Impossible d'installer Tesseract OCR"
                          return 1
                      }
                      ;;
                  *"Fedora"*|*"Red Hat"*|*"CentOS"*)
                      sudo dnf install -y tesseract tesseract-langpack-fra || {
                          echo "❌ Impossible d'installer Tesseract OCR"
                          return 1
                      }
                      ;;
                  *"Arch"*|*"Manjaro"*)
                      sudo pacman -S --noconfirm tesseract tesseract-data-fra || {
                          echo "❌ Impossible d'installer Tesseract OCR"
                          return 1
                      }
                      ;;
                  *"macOS"*|*"Darwin"*)
                      if ! command -v brew &> /dev/null; then
                          echo "📦 Installation de Homebrew..."
                          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                      fi
                      brew install tesseract tesseract-lang/fra || {
                          echo "❌ Impossible d'installer Tesseract OCR"
                          return 1
                      }
                      ;;
              esac
              echo "✅ Tesseract OCR installé avec succès !"
              return 0
          }

          # Fonction pour installer les dépendances OpenCV
          install_opencv_deps() {
              echo "📦 Installation des dépendances OpenCV..."
              case "$DISTRO" in
                  *"Debian"*|*"Ubuntu"*|*"MX"*|*"Linux Mint"*)
                      sudo apt-get install -y libglib2.0-0 libsm6 libxrender1 libxext6 libgl1-mesa-glx || {
                          echo "❌ Impossible d'installer les dépendances OpenCV"
                          return 1
                      }
                      ;;
                  *"Fedora"*|*"Red Hat"*|*"CentOS"*)
                      sudo dnf install -y glib2 libSM libXrender libXext mesa-libGL || {
                          echo "❌ Impossible d'installer les dépendances OpenCV"
                          return 1
                      }
                      ;;
                  *"Arch"*|*"Manjaro"*)
                      sudo pacman -S --noconfirm glib2 libsm libxrender libxext mesa || {
                          echo "❌ Impossible d'installer les dépendances OpenCV"
                          return 1
                      }
                      ;;
              esac
              echo "✅ Dépendances OpenCV installées avec succès !"
              return 0
          }
          
          # Vérifier la version de Python
          check_python_version() {
              python3 -c "import sys; exit(0) if sys.version_info >= (3, 8) else exit(1)" || {
                  echo "❌ Python 3.8+ requis. Version actuelle: $(python3 --version)"
                  return 1
              }
              return 0
          }
          
          # Vérifier Python
          if ! command -v python3 &> /dev/null; then
              echo "⚠️  Python 3 n'est pas installé sur votre système."
              echo ""
              read -p "❓ Voulez-vous que je l'installe automatiquement ? (o/N) " response
              
              if [[ "$response" =~ ^[OoYy]$ ]]; then
                  case "$DISTRO" in
                      *"Debian"*|*"Ubuntu"*|*"MX"*|*"Linux Mint"*)
                          sudo apt-get update || {
                              echo "❌ Échec de la mise à jour des paquets"
                              exit 1
                          }
                          sudo apt-get install -y python3 python3-pip python3-venv python3-full || {
                              echo "❌ Échec de l'installation automatique."
                              echo "📋 Essayez manuellement : sudo apt install python3 python3-pip python3-venv"
                              exit 1
                          }
                          ;;
                      *"Fedora"*|*"Red Hat"*|*"CentOS"*)
                          sudo dnf install -y python3 python3-pip python3-virtualenv || {
                              echo "❌ Échec de l'installation automatique."
                              echo "📋 Essayez manuellement : sudo dnf install python3 python3-pip"
                              exit 1
                          }
                          ;;
                      *"Arch"*|*"Manjaro"*)
                          sudo pacman -S --noconfirm python python-pip python-virtualenv || {
                              echo "❌ Échec de l'installation automatique."
                              echo "📋 Essayez manuellement : sudo pacman -S python python-pip"
                              exit 1
                          }
                          ;;
                      *"macOS"*|*"Darwin"*)
                          if ! command -v brew &> /dev/null; then
                              echo "📦 Installation de Homebrew..."
                              /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                          fi
                          brew install python@3.11 || {
                              echo "❌ Échec de l'installation automatique."
                              echo "📋 Essayez manuellement : brew install python@3.11"
                              exit 1
                          }
                          ;;
                      *)
                          echo "❌ Distribution non supportée pour l'installation automatique."
                          echo "📋 Installez Python manuellement pour votre distribution."
                          exit 1
                          ;;
                  esac
                  echo "✅ Python installé avec succès !"
              else
                  echo ""
                  echo "📋 Installez Python manuellement, puis relancez ce script."
                  exit 1
              fi
          fi
          
          # Vérifier la version de Python
          check_python_version || exit 1
          echo "✅ Python détecté: $(python3 --version)"
          echo ""
          
          # Vérifier et installer Tesseract OCR
          if ! command -v tesseract &> /dev/null; then
              echo "🔍 Tesseract OCR non détecté."
              echo ""
              read -p "❓ Voulez-vous installer Tesseract OCR (nécessaire pour l'OCR) ? (O/n) " tesseract_response
              
              if [[ "$tesseract_response" =~ ^[OoYy]*$ ]] || [ -z "$tesseract_response" ]; then
                  install_tesseract || {
                      echo "⚠️  Tesseract OCR n'est pas installé. L'OCR ne fonctionnera pas."
                  }
              else
                  echo "⚠️  Tesseract OCR non installé. L'OCR ne fonctionnera pas."
              fi
          else
              echo "✅ Tesseract OCR détecté: $(tesseract --version | head -n1)"
          fi

          # Installer les dépendances OpenCV
          echo ""
          echo "🔍 Installation des dépendances OpenCV..."
          install_opencv_deps || {
              echo "⚠️  Les dépendances OpenCV ne sont pas installées. Certaines fonctionnalités peuvent ne pas fonctionner."
          }
          echo ""
          
          # Utilisation d'un environnement virtuel
          VENV_DIR=".little_finance_env"
          echo "🔧 Configuration de l'environnement Python..."
          
          # Vérifier si l'environnement existe déjà
          if [ ! -d "$VENV_DIR" ]; then
              echo "📦 Création de l'environnement virtuel Python..."
              
              # Vérifier si python3-venv est installé
              if ! python3 -c "import venv" 2>/dev/null; then
                  echo "⚠️  Le module venv n'est pas disponible."
                  echo "📦 Installation de python3-venv..."
                  
                  case "$DISTRO" in
                      *"Debian"*|*"Ubuntu"*|*"MX"*|*"Linux Mint"*)
                          sudo apt-get install -y python3-venv python3-full || {
                              echo "❌ Impossible d'installer python3-venv"
                              echo "💡 Essayez: sudo apt install python3-venv python3-full"
                              exit 1
                          }
                          ;;
                      *"Fedora"*|*"Red Hat"*|*"CentOS"*)
                          sudo dnf install -y python3-virtualenv || {
                              echo "❌ Impossible d'installer python3-virtualenv"
                              exit 1
                          }
                          ;;
                      *"Arch"*|*"Manjaro"*)
                          sudo pacman -S --noconfirm python-virtualenv || {
                              echo "❌ Impossible d'installer python-virtualenv"
                              exit 1
                          }
                          ;;
                      *"macOS"*|*"Darwin"*)
                          echo "✅ venv devrait être disponible avec Python"
                          ;;
                  esac
              fi
              
              python3 -m venv "$VENV_DIR" || {
                  echo "❌ Impossible de créer l'environnement virtuel"
                  exit 1
              }
              echo "✅ Environnement virtuel créé !"
          else
              echo "✅ Environnement virtuel existant détecté"
          fi
          
          # Activer l'environnement virtuel
          source "$VENV_DIR/bin/activate"
          echo "✅ Environnement virtuel activé"
          
          # Installation de TOUTES les dépendances Python
          echo "📦 Installation des dépendances Python..."
          python -m pip install --upgrade pip --quiet
          python -m pip install streamlit pandas pytesseract Pillow python-dateutil opencv-python-headless numpy matplotlib pdfminer.six requests --quiet || {
              echo "❌ Erreur lors de l'installation des dépendances"
              echo "🔁 Nouvelle tentative avec des options étendues..."
              python -m pip install streamlit pandas pytesseract Pillow python-dateutil opencv-python-headless numpy matplotlib pdfminer.six requests --no-cache-dir || {
                  echo "❌ Échec critique de l'installation des dépendances"
                  exit 1
              }
          }
          echo "✅ Dépendances installées dans l'environnement virtuel !"
          
          # Vérification CRITIQUE que pytesseract est bien installé
          echo "🔍 Vérification de l'installation de pytesseract..."
          python -c "import pytesseract; print('✅ pytesseract importé avec succès')" || {
              echo "❌ pytesseract non installé, tentative de réinstallation..."
              python -m pip install pytesseract --force-reinstall --no-cache-dir || {
                  echo "❌ Échec critique de l'installation de pytesseract"
                  echo "💡 Le module OCR ne fonctionnera pas"
              }
          }

          # Vérification de OpenCV
          echo "🔍 Vérification de l'installation de OpenCV..."
          python -c "import cv2; print('✅ OpenCV importé avec succès')" || {
              echo "❌ OpenCV non installé, tentative de réinstallation..."
              python -m pip install opencv-python-headless --force-reinstall --no-cache-dir || {
                  echo "❌ Échec critique de l'installation de OpenCV"
                  echo "💡 Le traitement d'image ne fonctionnera pas"
              }
          }
          
          # Vérification finale de toutes les dépendances
          echo "🔍 Vérification finale des dépendances..."
          python -c "
          try:
              import streamlit
              import pandas
              import pytesseract
              import PIL
              import dateutil
              import cv2
              import numpy
              import matplotlib
              import requests
              print('✅ Toutes les dépendances sont installées avec succès!')
          except ImportError as e:
              print(f'❌ Erreur d\\'import: {e}')
              exit(1)
          " || {
              echo "❌ Certaines dépendances ne sont pas correctement installées"
              exit 1
          }
          
          # Lancer l'application
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ▶️  Lancement de l'application..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "💡 L'application va s'ouvrir dans votre navigateur"
          echo "💡 Pour arrêter : Fermez ce terminal (Ctrl+C)"
          echo "💡 Environnement: $VENV_DIR"
          echo ""
          
          sleep 2
          
          # Lancer Streamlit depuis l'environnement virtuel
          python -m streamlit run gestiolittle.py --server.port 8501 --server.headless true

          # Si Streamlit se ferme (erreur ou arrêt manuel)
          echo ""
          echo "🔧 Pour relancer l'application plus tard :"
          echo "   ./run.sh"
          echo ""
          RUNSCRIPT
          
          chmod +x dist/run.sh
          echo "✅ Script run.sh créé avec succès"
        shell: bash

      - name: 🏗️ Compiler l'application (optimisé antivirus)
        run: |
          # Installer pyinstaller uniquement pour la compilation
          python -m pip install pyinstaller
          
          # 🔥 CORRECTION : Utiliser lancer_gestiolittle.spec existant ou créer un fallback
          if [ -f "lancer_gestiolittle.spec" ]; then
            echo "📋 Utilisation de lancer_gestiolittle.spec existant..."
            pyinstaller lancer_gestiolittle.spec --clean --noconfirm
          else
            echo "📋 Création d'un .spec de secours..."
            # Créer un fichier .spec optimisé
            cat > gestiolittle.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          import os
          import glob
          
          block_cipher = None
          
          # Collecter tous les fichiers .py nécessaires
          py_files = []
          
          # Ajouter gestiolittle.py
          if os.path.exists('app/gestiolittle.py'):
              py_files.append(('app/gestiolittle.py', '.'))
          
          # 🔥 CRITIQUE : Ajouter configlittle.py
          if os.path.exists('app/configlittle.py'):
              py_files.append(('app/configlittle.py', '.'))
          
          # Ajouter auto_updater.py
          if os.path.exists('app/auto_updater.py'):
              py_files.append(('app/auto_updater.py', '.'))
          
          # Ajouter changelog_viewer.py
          if os.path.exists('app/changelog_viewer.py'):
              py_files.append(('app/changelog_viewer.py', '.'))
          
          # Ajouter le dossier tesseract s'il existe (uniquement pour Windows)
          if os.path.exists('tesseract'):
              py_files.append(('tesseract', 'tesseract'))
          
          a = Analysis(
              ['app/lancer_gestiolittle.py'],
              pathex=['app'],
              binaries=[],
              datas=py_files,
              hiddenimports=['streamlit', 'configlittle', 'auto_updater', 'changelog_viewer', 'pandas', 'pytesseract', 'PIL', 'cv2', 'numpy', 'dateutil', 'requests'],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=['pytest', 'unittest', 'test', '_pytest', 'setuptools', 'pip', 'wheel'],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          
          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.zipfiles,
              a.datas,
              [],
              name='GestionFinanciereLittle',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          EOF
            
            # Compiler avec le .spec de secours
            pyinstaller gestiolittle.spec --clean --noconfirm
          fi
          
          # 🔥 CORRECTION WINDOWS : Copier TOUS les fichiers Python à côté de l'exe
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "📦 Copie des modules Python à côté de l'exécutable..."
            cp app/configlittle.py dist/ || echo "⚠️ configlittle.py non copié"
            cp app/auto_updater.py dist/ || echo "⚠️ auto_updater.py non copié"
            cp app/changelog_viewer.py dist/ || echo "⚠️ changelog_viewer.py non copié"
            cp app/gestiolittle.py dist/ || echo "⚠️ gestiolittle.py non copié"
            
            # Copier tesseract
            if [ -d "tesseract" ]; then
              cp -r tesseract dist/
              echo "✅ Tesseract copié"
            fi
            
            # Vérifier que tous les fichiers sont présents
            echo "🔍 Vérification des fichiers dans dist/ :"
            ls -la dist/*.py || echo "⚠️ Aucun fichier .py trouvé dans dist/"
          fi
          
          echo "✅ Application compilée avec succès"
          
        shell: bash


      - name: ⚙️ Ajouter installateur automatique Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "🪄 Création de l'installateur PowerShell et du launcher .bat..."

          # Créer le dossier dist si besoin
          if (-not (Test-Path dist)) {
            New-Item -ItemType Directory -Path dist | Out-Null
          }

          # Créer le script PowerShell
          @"
          # =============================
          # 🚀 INSTALLATEUR AUTOMATIQUE GUI
          # Gestion Financière Little
          # =============================
          Add-Type -AssemblyName PresentationFramework
          function Show-Message {
              param ($title, $message, $type = "Info")
              [System.Windows.MessageBox]::Show($message, $title, [System.Windows.MessageBoxButton]::OK, [System.Windows.MessageBoxImage]::$type)
          }
          function Show-Progress { param($m) ; Write-Host ""; Write-Host "🕐 $m..." }
          function Download-File { param ($u, $d) ; $c = New-Object System.Net.WebClient ; $c.DownloadFile($u, $d) }

          if (-not ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltinRole]::Administrator)) {
              Show-Message "Droits administrateur requis" "❌ Ce script doit être lancé en tant qu'administrateur.`nClique droit → Exécuter avec PowerShell (Administrateur)" "Error"
              exit
          }

          Show-Progress "Vérification de Python"
          $pythonInstalled = Get-Command python -ErrorAction SilentlyContinue
          if (-not $pythonInstalled) {
              $ans = [System.Windows.MessageBox]::Show("Python n'est pas installé.`nVoulez-vous l'installer automatiquement ?", "Installation de Python", [System.Windows.MessageBoxButton]::YesNo, [System.Windows.MessageBoxImage]::Question)
              if ($ans -eq "No") { exit }
              $url = "https://www.python.org/ftp/python/3.13.0/python-3.13.0-amd64.exe"
              $installer = "$env:TEMP\\python_installer.exe"
              Show-Progress "Téléchargement de Python 3.13..."
              (New-Object System.Net.WebClient).DownloadFile($url, $installer)
              Show-Progress "Installation silencieuse de Python"
              Start-Process -FilePath $installer -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0" -Wait
              Remove-Item $installer -ErrorAction SilentlyContinue
              Show-Message "Installation terminée" "✅ Python 3.13 a été installé avec succès !" "Information"
          }

          Show-Progress "Vérification de pip"
          python -m ensurepip --upgrade | Out-Null
          python -m pip install --upgrade pip setuptools wheel | Out-Null

          Show-Progress "Installation des dépendances (cela peut prendre quelques minutes)"
          python -m pip install --upgrade streamlit pandas pytesseract Pillow python-dateutil opencv-python-headless numpy matplotlib pdfminer.six requests | Out-Null
          Show-Message "Dépendances installées" "✅ Toutes les dépendances ont été installées avec succès !" "Information"

          Show-Progress "Lancement de Gestion Financière Little"
          Start-Process "python" "-m streamlit run gestiolittle.py --server.headless true"
          Show-Message "Application lancée" "🚀 Gestion Financière Little a été démarrée avec succès !" "Information"
          "@ | Out-File -Encoding UTF8 dist/install_and_run_windows.ps1

          # Créer le launcher BAT
          @"
          @echo off
          powershell -ExecutionPolicy Bypass -File "install_and_run_windows.ps1"
          pause
          "@ | Out-File -Encoding ASCII dist/Lancer_GFL.bat

          Write-Host "✅ Installateur et launcher ajoutés dans dist/"


      - name: 📦 Créer le package de distribution
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cd dist
            # Vérifier la présence du fichier principal et du launcher
            if [ ! -f "GestionFinanciereLittle.exe" ]; then
              echo "❌ Erreur : exécutable non trouvé dans dist/"
              exit 1
            fi

            # Vérifier que tous les fichiers Python critiques sont présents
            echo "🔍 Vérification des fichiers Python critiques..."
            [ -f "configlittle.py" ] && echo "✅ configlittle.py présent" || echo "❌ configlittle.py MANQUANT"
            [ -f "gestiolittle.py" ] && echo "✅ gestiolittle.py présent" || echo "❌ gestiolittle.py MANQUANT"
            [ -f "auto_updater.py" ] && echo "✅ auto_updater.py présent" || echo "❌ auto_updater.py MANQUANT"
            [ -f "changelog_viewer.py" ] && echo "✅ changelog_viewer.py présent" || echo "❌ changelog_viewer.py MANQUANT"

            # Vérifier et inclure le dossier tesseract si présent
            if [ -d "tesseract" ]; then
              echo "📦 Inclusion du dossier tesseract..."
              7z a -tzip GestionFinanciereLittle-Windows.zip GestionFinanciereLittle.exe *.py tesseract/
            else
              7z a -tzip GestionFinanciereLittle-Windows.zip GestionFinanciereLittle.exe *.py
            fi

            cd ..
            echo "✅ Package Windows créé avec succès"
          
          elif [[ "$RUNNER_OS" == "Linux" ]] || [[ "$RUNNER_OS" == "macOS" ]]; then
            # Linux/macOS : Copier TOUS les fichiers Python nécessaires
            for file in app/*.py; do
              if [ -f "$file" ]; then
                cp "$file" dist/
                echo "📄 Copié: $file"
              fi
            done
            cd dist
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              zip -r GestionFinanciereLittle-Linux.zip *.py run.sh
              echo "✅ Package Linux créé avec tous les fichiers Python"
            else
              zip -r GestionFinanciereLittle-macOS.zip *.py run.sh
              echo "✅ Package macOS créé avec tous les fichiers Python"
            fi
            cd ..
          fi
        shell: bash

      - name: 📤 Upload de l'exécutable pour la Release (DRAFT)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "🧪 TEST - Gestion Financière Little v${{ github.run_number }}"
          draft: true  # ← 🔥 DRAFT MODE ACTIVÉ
          prerelease: false
          body: |
            ## ⚠️ CECI EST UNE DRAFT (VERSION DE TEST)
            
            Cette release n'est **PAS ENCORE PUBLIQUE**.
            Elle est visible **uniquement par vous** (propriétaire du dépôt).
            
            ### ✅ CORRECTIONS APPLIQUÉES DANS CETTE VERSION
            
            - ✅ **Fichier `configlittle.py` maintenant inclus** dans le ZIP Windows
            - ✅ Tous les modules Python copiés à côté de l'exécutable
            - ✅ Import corrigé : `from configlittle import ...` fonctionne maintenant
            - ✅ Vérification automatique de la présence des fichiers critiques
            
            ### ✅ ÉTAPES DE TEST AVANT PUBLICATION
            
            1. ⬇️ **Télécharger** les 3 fichiers ZIP ci-dessous
            2. 📦 **Extraire** chaque ZIP dans un dossier de test
            3. ✅ **Vérifier** la présence de ces fichiers dans le ZIP Windows :
               - `GestionFinanciereLittle.exe`
               - `gestiolittle.py`
               - `configlittle.py` ← **CRITIQUE**
               - `auto_updater.py`
               - `changelog_viewer.py`
               - `tesseract/` (dossier)
            4. ▶️ **Lancer** `GestionFinanciereLittle.exe`
            5. ✅ **Confirmer** que l'erreur `ModuleNotFoundError: No module named 'configlittle'` n'apparaît plus
            6. 🧪 **Tester** toutes les fonctionnalités (OCR, ajout manuel, récurrence, etc.)
            7. 📝 **Si tout est OK** :
               - Cliquez sur "Edit" (en haut à droite)
               - Cochez "Set as the latest release"
               - Modifiez les notes de version ci-dessous
               - Cliquez sur "Publish release" 🎉
            
            ---
            
            ## 📦 Téléchargements par Plateforme
            
            ### 🪟 Windows (Exécutable Standalone)
            - `GestionFinanciereLittle-Windows.zip`
            - ✅ Aucune installation requise
            - ⚠️ Extraire le ZIP et lancer le .exe
            - 🔧 Tesseract OCR inclus
            - 🔥 **CORRECTION : configlittle.py maintenant inclus**
            
            ### 🐧 Linux (Script Python)
            - `GestionFinanciereLittle-Linux.zip`
            - 📋 Prérequis : Python 3.8+
            - ▶️ Lancer : `chmod +x run.sh && ./run.sh`
            - 🔧 Environnement virtuel automatique
            - 🐛 Tous les fichiers Python inclus (configlittle.py, auto_updater.py, etc.)
            - 📦 Dépendances OpenCV incluses
            
            ### 🍎 macOS (Script Python)
            - `GestionFinanciereLittle-macOS.zip`
            - 📋 Prérequis : Python 3.8+
            - ▶️ Lancer : `chmod +x run.sh && ./run.sh`
            - 🔧 Environnement virtuel automatique
            - 🐛 Tous les fichiers Python inclus (configlittle.py, auto_updater.py, etc.)
            
            ---
            
            ## 🆕 Notes de version (À MODIFIER AVANT PUBLICATION)
            
            ### Nouveautés
            - [ ] Décrivez les nouvelles fonctionnalités
            - [ ] Ajoutez ce qui a été ajouté
            
            ### Corrections de bugs
            - [x] Correction : `ModuleNotFoundError: No module named 'configlittle'`
            - [ ] Listez les autres bugs corrigés
            
            ### Améliorations
            - [x] Amélioration du processus de build
            - [x] Vérification automatique de la présence des fichiers critiques
            - [ ] Décrivez les autres améliorations
            
            ---
            
            📖 **Guide complet** : [GUIDE_INSTALLATION.md](https://github.com/mdjabi2005-commits/gestion-financiere_little/blob/main/GUIDE_INSTALLATION.md)
            
            🔒 **Note de sécurité** : L'exécutable Windows peut être signalé comme faux positif par certains antivirus (PyInstaller). C'est normal et documenté dans le guide.
          files: |
            dist/GestionFinanciereLittle*.zip
          fail_on_unmatched_files: false
